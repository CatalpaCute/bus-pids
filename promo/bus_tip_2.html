<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Tip 2</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.22), transparent 35%),
        linear-gradient(140deg, #0c3657 0%, #155c86 52%, #2f8db8 100%);
      color: #fff;
      font-family: "Noto Sans", "Noto Serif SC", sans-serif;
    }

    .content {
      width: min(88vw, 1180px);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 2rem;
      align-items: center;
    }

    .panel {
      padding: 2.8rem 3rem;
      border-radius: 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3.4rem);
    }

    p {
      margin: 0.5rem 0;
      font-size: clamp(1rem, 1.9vw, 1.9rem);
      line-height: 1.7;
    }

    .badge {
      justify-self: end;
      width: clamp(160px, 20vw, 260px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 8px solid rgba(255, 255, 255, 0.55);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="panel">
      <h1>车辆进站时请勿追车</h1>
      <p>到站信息会持续刷新，请以现场车辆行驶情况为准。</p>
      <p>Do not chase a moving bus. Wait for the next service safely.</p>
    </div>
    <div class="badge">安全</div>
  </div>
</body>
</html>
