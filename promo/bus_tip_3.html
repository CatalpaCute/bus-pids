<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Tip 3</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(0deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)),
        repeating-linear-gradient(90deg, #dfeaf5 0, #dfeaf5 32px, #eef4fb 32px, #eef4fb 64px);
      color: #1b3550;
      font-family: "Noto Sans", "Noto Serif SC", sans-serif;
    }

    .wrap {
      width: min(86vw, 1120px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
    }

    h2 {
      margin: 0.75rem 0 0;
      font-size: clamp(1.4rem, 2.4vw, 2.2rem);
      font-weight: 600;
    }

    .rule {
      width: 100%;
      height: 0.5rem;
      margin: 2rem 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #11486d, #2d8cb9, #11486d);
    }

    p {
      margin: 0.4rem 0;
      font-size: clamp(1rem, 1.8vw, 1.8rem);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>韶关公交出行提示</h1>
    <h2>实时数据仅供参考，最终请以现场运营为准</h2>
    <div class="rule"></div>
    <p>线路、站点和方向均可在设置面板中切换。</p>
    <p>Live data is for reference only. Please follow the actual service on site.</p>
  </div>
</body>
</html>
