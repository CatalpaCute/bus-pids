<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Tip 1</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f2f8ff 0%, #dcefff 100%);
      color: #18324b;
      font-family: "Noto Sans", "Noto Serif SC", sans-serif;
    }

    .card {
      width: min(84vw, 1100px);
      padding: 3rem 4rem;
      border-radius: 2rem;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 20px 80px rgba(15, 54, 92, 0.18);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3.5rem);
    }

    p {
      margin: 0.5rem 0;
      font-size: clamp(1.1rem, 2vw, 2rem);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>文明候车，排队上车</h1>
    <p>请先下后上，主动照顾老幼病残孕乘客。</p>
    <p>Please queue and let passengers alight first.</p>
  </div>
</body>
</html>
